<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enrollment - Step 1 | Dominican School of Pilar, Inc.</title>
<style>
body {font-family: Arial; background:#fdf8f6; color:maroon; margin:0; padding:20px;}
header {background:maroon; color:white; padding:20px; text-align:center;}
header h1 {margin:0; font-family:'Times New Roman', serif; font-size:28px;}
.form-container {max-width:700px; margin:40px auto; background:white; padding:30px; border-radius:10px; border:2px solid maroon; box-shadow:0 0 15px rgba(0,0,0,0.1);}
h2 {text-align:center; margin-bottom:25px;}
input, select {width:100%; padding:10px; border-radius:5px; border:1px solid #ccc; font-size:16px; margin-bottom:15px;}
button {background:maroon; color:white; padding:12px; width:100%; border:none; border-radius:5px; cursor:pointer; font-size:16px;}
button:hover {background:#a00000;}
.name-fields {display:flex; gap:10px; margin-bottom:15px;}
.name-fields input {flex:1;}
@media(max-width:600px){.name-fields{flex-direction:column;}}
</style>
</head>
<body>

<header>
<h1>Dominican School of Pilar, Inc.</h1>
</header>

<div class="form-container">
<h2>Step 1: Student Information</h2>

<form action="enrollment_step2.html" method="GET">
  <div class="name-fields">
    <input type="text" name="lastName" placeholder="Last Name" required>
    <input type="text" name="firstName" placeholder="First Name" required>
    <input type="text" name="middleName" placeholder="Middle Name" required>
    <input type="text" name="nameExtension" placeholder="Extension (Optional)">
  </div>

  <input type="text" name="lrn" placeholder="LRN" required>

  <select name="grade" required>
    <option value="">Select Grade</option>
    <option>Grade 7</option>
    <option>Grade 8</option>
    <option>Grade 9</option>
    <option>Grade 10</option>
    <option>Grade 11</option>
    <option>Grade 12 - STEM</option>
    <option>Grade 12 - HUMSS</option>
    <option>Grade 12 - ABM</option>
    <option>Grade 12 - GAS</option>
    <option>Grade 12 - TVL (CSS)</option>
  </select>

  <input type="date" name="dob" required>

  <select name="gender" required>
    <option value="">Select Gender</option>
    <option>Female</option>
    <option>Male</option>
  </select>

  <input type="text" name="address" placeholder="Home Address" required>

  <button type="submit">Next: Parent & Payment Info</button>
</form>
</div>
</body>
</html>
