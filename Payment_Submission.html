<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enrollment - Step 3 | Dominican School of Pilar, Inc.</title>
<style>
body {font-family: Arial; background:#fdf8f6; color:maroon; margin:0; padding:20px;}

.form-container {max-width:700px; margin:40px auto; background:white; padding:30px; border-radius:10px; border:2px solid maroon; box-shadow:0 0 15px rgba(0,0,0,0.1);}
h2 {text-align:center; margin-bottom:25px;}
input {width:100%; padding:10px; border-radius:5px; border:1px solid #ccc; font-size:16px; margin-bottom:15px;}
button {background:maroon; color:white; padding:12px; width:100%; border:none; border-radius:5px; cursor:pointer; font-size:16px;}

<header>

<div class="form-container">
<h2>Step 3: Payment & Submission</h2>

<form action="https://docs.google.com/forms/d/e/YOUR_GOOGLE_FORM_ID/formResponse" method="POST">
  <div class="payment-box">
    <p>Please send your enrollment payment via <strong>GCash</strong>.</p>
    <p>GCash Number: <strong>09912614548</strong></p>
    <p>Enter the amount below and note your transaction ID.</p>
  </div>

  <label>Amount Paid (₱):</label>
  <input type="text" name="entry.1234567890" placeholder="Enter amount paid" required>

  <label>Transaction Reference / Notes:</label>
