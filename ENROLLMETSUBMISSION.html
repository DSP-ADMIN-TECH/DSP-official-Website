<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enrollment - Step 2 | Dominican School of Pilar, Inc.</title>
<style>
body {font-family: Arial; background:#fdf8f6; color:maroon; margin:0; padding:20px;}
header {background:maroon; color:white; padding:20px; text-align:center;}
header h1 {margin:0; font-family:'Times New Roman', serif; font-size:28px;}
.form-container {max-width:700px; margin:40px auto; background:white; padding:30px; border-radius:10px; border:2px solid maroon; box-shadow:0 0 15px rgba(0,0,0,0.1);}
h2 {text-align:center; margin-bottom:25px;}
input {width:100%; padding:10px; border-radius:5px; border:1px solid #ccc; font-size:16px; margin-bottom:15px;}
button {background:maroon; color:white; padding:12px; width:100%; border:none; border-radius:5px; cursor:pointer; font-size:16px;}
button:hover {background:#a00000;}
h3 {margin-top:25px; margin-bottom:10px;}
</style>
</head>
<body>

<header>
<h1>Dominican School of Pilar, Inc.</h1>
</header>

<div class="form-container">
<h2>Step 2: Parent / Guardian Information</h2>

<form action="Payment_Submission.html" method="GET">
  <!-- Father Info -->
  <h3>Father Information</h3>
  <input type="text" name="fatherName" placeholder="Name" required>
  <input type="text" name="fatherOccupation" placeholder="Occupation" required>
  <input type="text" name="fatherAddress" placeholder="Address" required>
  <input type="tel" name="fatherContact" placeholder="Contact Number" pattern="[0-9]{11}" required>

  <!-- Mother Info -->
  <h3>Mother Information</h3>
  <input type="text" name="motherName" placeholder="Name" required>
  <input type="text" name="motherOccupation" placeholder="Occupation" required>
  <input type="text" name="motherAddress" placeholder="Address" required>
  <input type="tel" name="motherContact" placeholder="Contact Number" pattern="[0-9]{11}" required>

  <!-- Guardian Info -->
  <h3>Guardian Information</h3>
  <input type="text" name="guardianName" placeholder="Name" required>
  <input type="text" name="guardianOccupation" placeholder="Occupation" required>
  <input type="text" name="guardianAddress" placeholder="Address" required>
  <input type="tel" name="guardianContact" placeholder="Contact Number" pattern="[0-9]{11}" required>

  <button type="submit">Next: Payment & Submission</button>
</form>
</div>
</body>
</html>
